name: Release Plugin

on:
    push:
        tags:
            - "*"

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Create plugin zip
              run: |
                  mkdir -p release
                  cp main.js manifest.json styles.css release/ 2>/dev/null || cp main.js manifest.json release/
                  cd release
                  zip -r ../obsidian-tags-plugin-${{ github.ref_name }}.zip .

            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  release_name: Release ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: |
                      obsidian-tags-plugin-${{ github.ref_name }}.zip
                      main.js
                      manifest.json
                      styles.css
